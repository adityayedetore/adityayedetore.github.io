        keywords:
          - Representation and computation in neural networks
          - Compositionality, systematicity, and productivity
          - Formal theories of generalization
          - Language acquisition
          - Symbolic structure in cognition

      - name: Current Focus
        keywords:
          - Human and neural network generalization
          - Classical computation in connectionist systems
          - Formal constraints on representational inference

