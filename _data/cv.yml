  location: Boston, MA
  image: ""
  summary: >
    PhD student in the Linguistics Department at Boston University working with Najoung Kim.
    My research concerns representation and computation in neural networks, with particular
    focus on compositionality, systematicity, productivity, and the formal conditions under
    which behavioral generalization constrains internal computational architecture.

